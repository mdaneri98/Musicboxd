# Mensajes por defecto de Bean Validation (Español)
NotNull=no debe ser nulo
NotBlank=no debe estar en blanco
NotEmpty=no debe estar vacío
Email=debe ser un email válido
Size=la longitud debe estar entre {min} y {max}
Min=debe ser mayor o igual que {value}
Max=debe ser menor o igual que {value}
Pattern=debe coincidir con "{regexp}"
Positive=debe ser mayor que 0
PositiveOrZero=debe ser mayor o igual que 0
Negative=debe ser menor que 0
NegativeOrZero=debe ser menor o igual que 0

login.username.NotBlank=El nombre de usuario es obligatorio
