# Bean Validation default messages (English)
NotNull=must not be null
NotBlank=must not be blank
NotEmpty=must not be empty
Email=must be a well-formed email address
Size=length must be between {min} and {max}
Min=must be greater than or equal to {value}
Max=must be less than or equal to {value}
Pattern=must match "{regexp}"
Positive=must be greater than 0
PositiveOrZero=must be greater than or equal to 0
Negative=must be less than 0
NegativeOrZero=must be less than or equal to 0

login.username.NotBlank=Username is required
login.username.Size=Username must be between {min} and {max} characters
login.password.NotBlank=Password is required
login.password.Size=Password must be at least {min} characters

